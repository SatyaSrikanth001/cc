# config.yaml – final consolidated configuration

data:
  features_dir: "features/v2"      # full dataset (features + id columns)
  id_columns:
    - user_id
    - device_owner_id
    - is_genuine
  feature_prefix: ""                            # if your feature columns have a common prefix

cleaning:
  missing_threshold: 0.3                        # drop features with >30% missing
  constant_user_threshold: 0.8                  # drop features constant in >80% of users

# Phase 2A – Noise Purge
noise_purge:
  noise_threshold: 0.52                         # median AUC below which features are dropped

# Phase 2B – Elite Ranking
top_k: 100                                      # number of elite features to retain

# Phase 3 – mRMR
final_k: 40                                     # number of final features selected by mRMR

# Phase 4 – Consensus
consensus:
  weights:
    our_phase2b: 2
    fisher: 1
    mutual_info: 1
    relieff: 1
    laplacian: 1

# Phase 5 – OCSVM validation
ocsvm:
  nu: 0.1
  gamma: "scale"                               # can be a float or 'scale'
  test_split_ratio: 0.2

output:
  filtered_features: "phase2a_survivors.csv"
  auc_details: "phase2a_auc_details.csv"
  elite_features: "phase2b_top100_features.csv"
  behavioral_ranking: "phase2b_ranking.csv"
  final_features: "phase3_final_40_features.csv"       # Phase 3 output
  mrmr_scores: "phase3_mrmr_scores.csv"
  consensus_ranking: "phase4_consensus_ranking.csv"
  final_selected_features: "phase4_final_selected_features.csv"   # Phase 4 output (preferred)
  eer_results: "phase5_eer_results.csv"
  validation_boxplot: "phase5_validation_boxplots.png"
  summary_metrics: "phase5_summary_metrics.csv"
